[mypy]
python_version = 3.12
files = src/
exclude = (management/|manage.py)

install_types = true
show_error_codes = true
mypy_path = "$MYPY_CONFIG_FILE_DIR/stubs/:$MYPY_CONFIG_FILE_DIR/src/:"
strict = false
ignore_missing_imports = True
namespace_packages = true

[mypy-sdjango_celery_boost.*]
ignore_missing_imports = True
follow_imports = skip

[mypy-environ.*]
ignore_errors = True
