[tox]
requires =
    tox>=4.2
    tox-gh-actions
    tox-uv>=1.20.2
env_list =
    lint
    docs
    type
    pkg_meta
    d{42}-py{39}
    d{52}-py{310}
skip_missing_interpreters = true

[testenv]
pass_env =
    PGHOST
    PGPORT
    PYTHONDONTWRITEBYTECODE
    DATABASE_URL
set_env =
    d42: DJANGO = "django==4.2.*"
    d52: DJANGO = "django==5.2.*"
change_dir = {toxinidir}
commands =
    pytest -x {posargs:tests}
dependency_groups = dev
whitelist_externals = mkdir

[testenv:lint]
description = run static analysis and style check using ruff
skip_install = true
deps =
    pre-commit-uv>=4.1.1
pass_env =
    HOMEPATH
    PROGRAMDATA
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:pkg_meta]
description = check that the long description is valid
skip_install = true
deps =
    check-manifest
    check-wheel-contents>=0.6
    twine>=5.1.1
    uv>=0.5
commands =
    check-manifest
    uv build --sdist --wheel --out-dir {env_tmp_dir} .
    twine check {env_tmp_dir}{/}*
    check-wheel-contents --ignore W002 --no-config {env_tmp_dir}
